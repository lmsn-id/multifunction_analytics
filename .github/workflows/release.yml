name: Build & Release Flutter APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Install Dependencies
        run: flutter pub get

      - name: Get Version From pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir release
          cp build/app/outputs/flutter-apk/app-release.apk release/SPKAnalyze-${VERSION}.apk

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: SPKAnalyze v${{ env.VERSION }}
          generate_release_notes: true
          files: release/SPKAnalyze-${{ env.VERSION }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SPKAnalyze-${{ env.VERSION }}
          path: release/SPKAnalyze-${{ env.VERSION }}.apk